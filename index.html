<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick A Flick - Ultimate Movie Recommendations</title>
    
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header class="navbar-header">
        <nav class="navbar">
            <div class="nav-logo">
                <a href="#">🎬 Pick A Flick</a>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="nav-item active" id="nav-home">Home</a></li>
                <li><a href="#movie-listing-section" class="nav-item" id="nav-categories">Categories</a></li>
                <li><a href="#movie-listing-section" class="nav-item" id="nav-top-rated">Top Rated</a></li>
            </ul>
            <div class="profilesec">
                <button class="icon-btn" aria-label="Bookmarks" id="bookmark-btn">
                    <span class="material-symbols-outlined">bookmark</span>
                </button>
                <button class="icon-btn" aria-label="Profile" id="profile-btn">
                    <span class="material-symbols-outlined">person_2</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title">Your Next Cinematic Adventure Awaits</h1>
                <p class="hero-tagline">Explore curated collections, filter by your favorite genres, and find exactly what to watch tonight.</p>
                <a href="#movie-listing-section" class="btn-explore">Explore Movies</a>
            </div>
        </section>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <h2 class="search-heading">Looking for something specific?</h2>
                <div class="search-box">
                    <input 
                        type="text" 
                        id="movie-search-input" 
                        placeholder="Search for movies by title..." 
                        autocomplete="off"
                        aria-label="Search movies"
                    >
                    <button id="movie-search-btn" class="btn-search">Search</button>
                </div>
            </div>
        </section>

        <!-- Movie Listing and Filters Section -->
        <section id="movie-listing-section" class="movie-listing-section">
            <div class="all-container">
                
                <!-- Filters Sidebar/Bar -->
                <section class="filter-container">
                    <div class="filter-group">
                        <h3 class="filter-label">Browse by Genre</h3>
                        <div class="genre-btn-group">
                            <button class="btn all-btn active" id="genre-all">All Genres</button>
                            <button class="btn" id="genre-action">Action</button>
                            <button class="btn" id="genre-comedy">Comedy</button>
                            <button class="btn" id="genre-drama">Drama</button>
                            <button class="btn" id="genre-scifi">Sci-Fi</button>
                            <button class="btn" id="genre-horror">Horror</button>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="filter-group">
                        <h3 class="filter-label">Filter by Rating</h3>
                        <div class="rating-btn-group">
                            <button id="rating-all" class="btn all-btn active">All Ratings</button>
                            <button id="rating-9" class="btn">Above ⭐ 9</button>
                            <button id="rating-8" class="btn">Above ⭐ 8</button>
                            <button id="rating-7" class="btn">Above ⭐ 7</button>
                        </div>
                    </div>
                </section>

                <!-- Movie Cards Grid -->
                <section class="cardsContainer" id="cardsContainer"></section>
                
            </div>
        </section>

    </main>

    <!-- Scripts -->
    <script src="data/movies.js"></script>
    <script src="app.js"></script>
</body>
</html>
